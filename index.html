<html>
	<head>
		<title>India 2019 Election</title>

		<!--Scripts-->

	   	<script src="scripts/jquery-3.1.1.min.js"></script>
	   	<script src="scripts/bootstrap/bootstrap.min.js"></script>
	   	
	   	<script src="scripts/d3.v4.js"></script>
	    <script src="scripts/queue.js"></script>
	    <script src="scripts/select2.min.js"></script>
	    <script src="scripts/topojson.v2.min.js"></script>
	    <link href="scripts/bootstrap/bootstrap.min.css" rel="stylesheet" />
	    <link href="css/select2.min.css" rel="stylesheet" />
	    <link href="css/main.css" rel="stylesheet">
	</head>
	<body>
		<nav class="navbar navbar">
		  <div class="container-fluid">
		    <ul class="nav nav-tabs">

		    	<li class="active"><a data-toggle="tab" href="#map-tab">Map</a></li>
			    <li><a data-toggle="tab" href="#margin-tab">Margin</a></li>

			    <ul class="nav navbar-nav navbar-right">
		      	<li class="search">
			      		State: 
			      		<select class="state-select" name="states">
						</select>
					</li>
					<li class="search">			      
						Constituency: 
			      		<select class="constituency-select" name="states">
						</select>
				</li>
		    	</ul>
		    </ul>
		  </div>
		</nav>

		<div class="tab-content">
			<div id="map-tab" class="tab-pane fade  in active">
				<div class="section">
			    <div class='row'>
			    	<div class="col-md-1">
			    	</div>
			    	<div class="col-md-3">
						<div style="color: #696969; font-size: 20px;" id="map-switch-div">
			    			Cartogram &nbsp<label class="switch">
							  <input type="checkbox" class="map-switch">
							  <span class="slider round"></span>
							</label>
							&nbsp Geographic Map
			    		</div>
			    	</div>
			    	<div class="col-md-4">
			    		<div id="year-slider-map"></div>
			    		<br><br>
			    	</div>
			    	<div class="col-md-4">
			    	</div>
			    </div>
			    <div class='row'>
			    	<div class="col-md-1"></div>
			    	<div class="col-md-7">
			    		<div id="map"></div>
			    		
			    	</div>
			    	<div class="col-md-4">
			    		<div id="map-legend"></div>
			    	</div>
			    </div>
				</div>
		  	</div>

		  	<div id="margin-tab" class="tab-pane fade">
		  		<div class="section">
				<div class="row">
					<div class="col-md-1"></div>
					<div class="col-md-10">
						<div style="color: #696969; font-size: 20px;" id="margin-switch-div">
			    			Votes &nbsp<label class="switch">
							  <input type="checkbox" class="margin-switch" >
							  <span class="slider round"></span>
							</label>
							&nbsp Percentage
			    		</div>
					</div>
					<div class="col-md-1"></div>
				</div>
			    <div class='row'>
			    	<div class="col-md-1"></div>
			    	<div class="col-md-10">
			    		<div id="margin"></div>
			    		<div id="margin-map"></div>
			    	</div>
			    	<div class="col-md-1">
			    	</div>
			    </div>
			    </div>
		  	</div>
		</div>

	  	<script src="js/map.js">  </script>
	  	<script src="js/margin.js">  </script>
	  	<script>
	  	// In your Javascript (external .js resource or <script> tag)
		$(document).ready(function() {
		    $('.state-select').select2();
		    $('.constituency-select').select2();
		});

	  	</script>
	</body>
</html>
